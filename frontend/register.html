<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HealthHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="navbar-brand">HealthHub</a>
            <div class="navbar-menu">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 600px; margin-top: 3rem;">
        <div class="card">
            <div class="card-header text-center">
                Create Your Account
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="full_name" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="phone" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password (min 6 characters)</label>
                        <input type="password" id="password" class="form-control" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirm_password" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Register as</label>
                        <select id="role" class="form-control">
                            <option value="user">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <div id="doctorFields" class="hidden">
                        <div class="form-group">
                            <label class="form-label">Specialty</label>
                            <input type="text" id="specialty" class="form-control">
                        </div>

                        <div class="form-group">
                            <label class="form-label">License Number</label>
                            <input type="text" id="license_number" class="form-control">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Years of Experience</label>
                            <input type="number" id="experience_years" class="form-control" min="0">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Consultation Fee ($)</label>
                            <input type="number" id="consultation_fee" class="form-control" min="0" step="0.01">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
                </form>

                <div class="text-center mt-3">
                    <p style="color: var(--text-secondary);">
                        Already have an account? <a href="login.html" style="color: var(--primary-light);">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            redirectToDashboard();
        }

        // Show/hide doctor fields
        document.getElementById('role').addEventListener('change', (e) => {
            const doctorFields = document.getElementById('doctorFields');
            if (e.target.value === 'doctor') {
                doctorFields.classList.remove('hidden');
            } else {
                doctorFields.classList.add('hidden');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            const userData = {
                full_name: document.getElementById('full_name').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password,
                role: document.getElementById('role').value,
            };

            // Add doctor-specific fields if registering as doctor
            if (userData.role === 'doctor') {
                userData.specialty = document.getElementById('specialty').value;
                userData.license_number = document.getElementById('license_number').value;
                userData.experience_years = document.getElementById('experience_years').value;
                userData.consultation_fee = document.getElementById('consultation_fee').value;
            }

            try {
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Registering...';

                await api.register(userData);

                showAlert('Registration successful! Redirecting to login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                showAlert(error.message || 'Registration failed', 'error');
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
