<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – HealthHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="navbar-brand">HealthHub</a>
        </div>
    </div>

    <div class="container" style="max-width: 480px; margin: 4rem auto;">
        <div class="card">
            <div class="card-header" style="text-align:center;">🔒 Forgot Password</div>
            <div class="card-body">

                <!-- Step 1: Request reset link -->
                <div id="step1">
                    <p class="text-secondary" style="margin-bottom:1.5rem;">
                        Enter the email address linked to your account and we'll send you a reset link.
                    </p>
                    <form id="forgotForm">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="resetEmail" class="form-control" required
                                   placeholder="you@example.com">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
                    </form>
                    <p style="margin-top:1rem; text-align:center;">
                        <a href="login.html" style="color:var(--primary-light);">← Back to Login</a>
                    </p>
                </div>

                <!-- Step 2: Enter token + new password -->
                <div id="step2" class="hidden">
                    <p class="text-secondary" style="margin-bottom:1.5rem;">
                        Check your email for the reset token, then enter it below along with your new password.
                    </p>
                    <form id="resetForm">
                        <div class="form-group">
                            <label class="form-label">Reset Token</label>
                            <input type="text" id="resetToken" class="form-control" required placeholder="Paste token from email">
                        </div>
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <input type="password" id="newPassword" class="form-control" required
                                   placeholder="At least 8 characters" minlength="8">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="confirmPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">Set New Password</button>
                    </form>
                </div>

                <!-- Step 3: Success -->
                <div id="step3" class="hidden" style="text-align:center; padding:2rem;">
                    <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
                    <h3 style="color:var(--success-color); margin-bottom:0.5rem;">Password Updated!</h3>
                    <p class="text-secondary">You can now log in with your new password.</p>
                    <a href="login.html" class="btn btn-primary" style="display:inline-block; margin-top:1.5rem;">Go to Login</a>
                </div>

                <div id="alertBox" class="hidden" style="margin-top:1rem; padding:0.75rem 1rem; border-radius:6px;"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function showMsg(msg, type) {
            const el = document.getElementById('alertBox');
            el.textContent = msg;
            el.style.background = type === 'error' ? 'rgba(239,68,68,0.15)' : 'rgba(16,185,129,0.15)';
            el.style.color = type === 'error' ? '#f87171' : '#34d399';
            el.classList.remove('hidden');
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            try {
                await api.forgotPassword(email);
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                showMsg('Reset link sent! Check your email (or ask your admin for the token in dev mode).', 'success');
            } catch (err) {
                showMsg(err.message, 'error');
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token    = document.getElementById('resetToken').value.trim();
            const password = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('confirmPassword').value;
            if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
            try {
                await api.resetPassword(token, password);
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('alertBox').classList.add('hidden');
            } catch (err) {
                showMsg(err.message, 'error');
            }
        });
    </script>
</body>
</html>
